$kind: http-request
url: "{{baseUrl}}/flights/search?origin=<string>&destination=<string>&departure\
  Date=<date>&returnDate=<date>&passengers=1&cabinClass=business"
method: GET
queryParams:
  - key: origin
    value: <string>
    description: "(Required) "
  - key: destination
    value: <string>
    description: "(Required) "
  - key: departureDate
    value: <date>
    description: "(Required) "
  - key: returnDate
    value: <date>
  - key: passengers
    value: "1"
  - key: cabinClass
    value: business
scripts:
  - type: afterResponse
    code: >
      // Auto-injected contract tests

      pm.test("Status code is 2xx", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201, 202, 204]);
      });


      pm.test("Response time under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });


      pm.test("Content-Type is JSON", function () {
          if (pm.response.code !== 204) {
              pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
          }
      });


      pm.test("Response body is valid JSON", function () {
          if (pm.response.code !== 204) {
              pm.response.to.be.json;
          }
      });


      if (pm.response.code === 200 || pm.response.code === 201) {
          pm.test("Response has expected structure", function () {
              const body = pm.response.json();
              pm.expect(body).to.be.an("object").or.an("array");
          });
      }
    language: text/javascript
examples: ./.resources/Search flights.resources/examples
order: 1000
