$kind: http-request
name: GET /passengers/:id
url: "{{baseUrl}}/passengers/{{passengerId}}"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Passenger has required fields', () => {
        const json = pm.response.json();
        pm.expect(json).to.have.all.keys('id','firstName','lastName','dateOfBirth','passportNumber','nationality','email','createdAt');
      });
    language: text/javascript
order: 2000
