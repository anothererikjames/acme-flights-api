$kind: http-request
name: POST /passengers
url: "{{baseUrl}}/passengers"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: '{"firstName": "Jane", "lastName": "Testuser", "dateOfBirth":
    "1990-06-15", "passportNumber": "TEST123456", "nationality": "US", "email":
    "jane.test@acme.com"}'
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 201', () => pm.response.to.have.status(201));

      pm.test('Passenger has id', () =>
      pm.expect(pm.response.json()).to.have.property('id'));

      pm.test('Name matches', () => {
        const json = pm.response.json();
        pm.expect(json.firstName).to.eql('Jane');
        pm.expect(json.lastName).to.eql('Testuser');
      });

      pm.collectionVariables.set('passengerId', pm.response.json().id);
    language: text/javascript
order: 1000
