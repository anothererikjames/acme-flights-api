$kind: http-example
request:
  url: http://{{baseUrl}}/flights/search?origin=string&destination=string&departureDate=2020-08-03&returnDate=2020-08-03&passengers=1&cabinClass=economy
  method: GET
  headers:
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    origin: string
    destination: string
    departureDate: 2020-08-03
    returnDate: 2020-08-03
    passengers: "1"
    cabinClass: economy
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
