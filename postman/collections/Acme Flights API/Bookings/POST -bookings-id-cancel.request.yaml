$kind: http-request
name: POST /bookings/:id/cancel
url: "{{baseUrl}}/bookings/{{bookingId}}/cancel"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: '{"reason": "Test cancellation"}'
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Status is cancelled', () =>
      pm.expect(pm.response.json().status).to.eql('cancelled'));
    language: text/javascript
order: 3000
